ID: mta_tic-tac-toe
_schema-version: '2.1'
parameters:
  deploy_mode: html5-repo
version: 0.0.1
modules:
  - name: mta_tic-tac-toe_appRouter
    type: approuter.nodejs
    path: mta_tic-tac-toe_appRouter
    parameters:
      disk-quota: 256M
      memory: 256M
    requires:
      - name: mta_tic-tac-toe_html5_repo_runtime
      - name: uaa_mta_tic-tac-toe
      - name: mta_tic-tac-toe_destination
  - name: mta_tic-tac-toe_ui_deployer
    type: com.sap.html5.application-content
    path: mta_tic-tac-toe_ui_deployer
    requires:
      - name: mta_tic-tac-toe_html5_repo_host
    build-parameters:
      requires:
        - name: tic-tac-toe
          artifacts:
            - './*'
          target-path: resources/tic-tac-toe
  - name: tic-tac-toe
    type: html5
    path: tic-tac-toe
    build-parameters:
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
      build-result: dist
resources:
  - name: mta_tic-tac-toe_html5_repo_runtime
    parameters:
      service-plan: app-runtime
      service: html5-apps-repo
    type: org.cloudfoundry.managed-service
  - name: mta_tic-tac-toe_html5_repo_host
    parameters:
      service-plan: app-host
      service: html5-apps-repo
    type: org.cloudfoundry.managed-service
  - name: uaa_mta_tic-tac-toe
    parameters:
      path: ./xs-security.json
      service-plan: application
      service: xsuaa
    type: org.cloudfoundry.managed-service
  # Managed destination service. Provisions the "game-server" destination on
  # deploy (init_data). Replace URL with the host where server/ is deployed;
  # forwardAuthToken passes the XSUAA JWT to the server (validated by auth.js).
  - name: mta_tic-tac-toe_destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: game-server
                Description: Tic Tac Toe WebSocket game server
                Type: HTTP
                URL: https://REPLACE-with-your-game-server-host
                ProxyType: Internet
                Authentication: NoAuthentication
                forwardAuthToken: true
                HTML5.DynamicDestination: true
